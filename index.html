<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Букет троянд</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #fdfbfb, #ebedee);
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 1.2s ease;
    }

    img {
      width: 260px;
      max-width: 80vw;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      transition: transform 0.4s, box-shadow 0.4s;
    }

    img:hover {
      transform: scale(1.08) rotate(1deg);
      box-shadow: 0 20px 45px rgba(0,0,0,0.3);
    }

    .hint {
      margin-top: 15px;
      font-size: 14px;
      color: #666;
      opacity: 0.8;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 20px;
      max-width: 90%;
      text-align: center;
      animation: scaleUp 0.4s ease;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
    }

    p {
      font-size: 16px;
      line-height: 1.5;
    }

    .close {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      background: linear-gradient(135deg, #ff7b7b, #ff4d4d);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .close:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleUp {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Адаптація під телефон */
    @media (max-width: 480px) {
      img {
        width: 200px;
      }

      h2 {
        font-size: 20px;
      }

      p {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <img src="photo_2026-04-03_18-51-57.jpg" alt="Білі троянди" onclick="openModal()">
  <div class="hint">Натисни на букет 🌹</div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Ти неймовірна 💖</h2>
    <p>
      Ці білі троянди для тебе — символ ніжності, чистоти та щирих почуттів.<br><br>
      Ти робиш цей світ красивішим просто тим, що ти є ✨
    </p>
    <button class="close" onclick="closeModal()">Закрити</button>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  window.onclick = function(event) {
    const modal = document.getElementById('modal');
    if (event.target === modal) {
      modal.style.display = 'none';
    }
  }
</script>

</body>
</html>
